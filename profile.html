<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>xclone - Profile</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav>
  <a href="/">Home</a>
  <a href="/post">Post</a>
  <a href="/profile">Profile</a>
  <a href="/users">Users</a>
  <button onclick="doLogout()">Logout</button>
</nav>
<main class="container">
  <h1>Profile</h1>
  <form id="profileForm">
    <div class="form-group">
      <label for="display_name">Display Name</label>
      <input type="text" id="display_name" name="display_name">
    </div>
    <div class="form-group">
      <label for="bio">Bio</label>
      <textarea id="bio" name="bio" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label for="password">New Password (leave blank to keep current)</label>
      <input type="password" id="password" name="password" autocomplete="new-password">
    </div>
    <button type="submit">Save Changes</button>
  </form>
  <div id="msg"></div>
</main>
<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '/login'; }

async function loadProfile() {
  const res = await fetch('/api/users/me', { headers: { 'Authorization': 'Bearer ' + token } });
  if (res.status === 401) { window.location.href = '/login'; return; }
  const user = await res.json();
  document.getElementById('display_name').value = user.display_name || '';
  document.getElementById('bio').value = user.bio || '';
}

document.getElementById('profileForm').addEventListener('submit', handleSubmit);

async function handleSubmit(e) {
  e.preventDefault();
  const payload = {
    display_name: document.getElementById('display_name').value,
    bio: document.getElementById('bio').value
  };
  const pw = document.getElementById('password').value;
  if (pw) payload.password = pw;
  const res = await fetch('/api/users/me', {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify(payload)
  });
  document.getElementById('msg').textContent = res.ok ? 'Profile saved!' : 'Failed to save.';
}

function doLogout() {
  localStorage.removeItem('token');
  window.location.href = '/login';
}

loadProfile();
</script>
</body>
</html>
